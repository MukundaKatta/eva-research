name: Weekly Research Loop

on:
  schedule:
    # Every Monday at 13:00 UTC (06:00 PT)
    - cron: "0 13 * * 1"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  run-weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weekly research loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: pnpm run-weekly

      - name: Determine week identifier
        id: week
        run: echo "week=$(node -e "const d=new Date();const day=d.getUTCDay()||7;const thu=new Date(d);thu.setUTCDate(d.getUTCDate()+4-day);const y=thu.getUTCFullYear();const ys=new Date(Date.UTC(y,0,1));const w=Math.ceil(((thu-ys)/86400000+1)/7);console.log(y+'-'+String(w).padStart(2,'0'))")" >> "$GITHUB_OUTPUT"

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK="${{ steps.week.outputs.week }}"
          BRANCH="memo/${WEEK}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add memos/ rankings.json
          git commit -m "chore: weekly memo ${WEEK}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "Weekly memo ${WEEK}" \
            --body "$(cat memos/${WEEK}.md)" \
            --base main \
            --head "${BRANCH}" \
            --label "memo"
